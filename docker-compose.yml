services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    image: hidra-api:latest
    container_name: hidra-api
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - ./data:/app/data:ro
      - ./logs/checkpoints:/app/logs/checkpoints:ro
      - ./data/model_cache:/app/data/model_cache
      - ./results:/app/results:ro
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/src
      - ETR_CACHE_KEY=${ETR_CACHE_KEY:-}
      - API_KEY=${API_KEY:-}
      - ENABLE_DOCS=${ENABLE_DOCS:-1}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c ''import urllib.request; urllib.request.urlopen("http://localhost:8000/stats")''',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - hidra

  web:
    build:
      context: ./services/web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    image: hidra-web:latest
    container_name: hidra-web
    restart: unless-stopped
    ports:
      - "${WEB_BIND:-127.0.0.1}:${WEB_PORT:-5173}:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - hidra

networks:
  hidra:
    driver: bridge
